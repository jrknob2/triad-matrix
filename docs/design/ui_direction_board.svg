<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1b1710" flood-opacity="0.18"/>
    </filter>
    <style>
      .label { font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 800; fill: #191713; }
      .copy { font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 500; fill: #5d5548; }
      .tiny { font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 700; fill: #706657; font-size: 12px; }
      .pattern { font-family: Avenir Next, Helvetica, Arial, sans-serif; font-weight: 900; letter-spacing: -1px; fill: #111; }
      .mono { font-family: SF Mono, Menlo, monospace; font-weight: 800; fill: #111; }
    </style>
  </defs>

  <rect width="1440" height="1000" fill="#eee7d9"/>
  <text x="60" y="64" class="label" font-size="32">Drumcabulary UI Direction Board</text>
  <text x="60" y="94" class="copy" font-size="17">Three screen directions to evaluate before changing Flutter UI code.</text>

  <!-- Direction 1 -->
  <g transform="translate(70 145)">
    <text x="0" y="-28" class="label" font-size="22">1. Warm Coach Bento</text>
    <text x="0" y="-6" class="copy" font-size="14">Friendly, editorial, card-first guidance. Best for Coach.</text>
    <rect x="0" y="0" width="360" height="760" rx="42" fill="#15130f" filter="url(#shadow)"/>
    <rect x="10" y="10" width="340" height="740" rx="34" fill="#fbf4e7"/>
    <rect x="10" y="10" width="340" height="105" rx="34" fill="#f0c35b"/>
    <text x="32" y="58" class="label" font-size="26">Coach</text>
    <text x="32" y="86" class="copy" font-size="14" fill="#3c321f">Know what to practice next.</text>
    <circle cx="306" cy="62" r="24" fill="#211d17"/>
    <text x="290" y="70" class="mono" font-size="18" fill="#f3b348">RKL</text>

    <rect x="28" y="140" width="304" height="175" rx="26" fill="#1f1a14"/>
    <text x="50" y="176" font-family="Avenir Next, Helvetica, Arial" font-size="13" font-weight="800" fill="#f0c35b">FOCUS</text>
    <text x="50" y="213" font-family="Avenir Next, Helvetica, Arial" font-size="26" font-weight="900" fill="#fff4de">Start with RLL</text>
    <text x="50" y="244" font-family="Avenir Next, Helvetica, Arial" font-size="14" font-weight="600" fill="#d3c6ad">Your left hand needs clean reps before the phrase gets faster.</text>
    <rect x="50" y="266" width="134" height="34" rx="17" fill="#f05a28"/>
    <text x="75" y="288" font-family="Avenir Next, Helvetica, Arial" font-size="13" font-weight="800" fill="#fff">Start Practice</text>

    <rect x="28" y="335" width="145" height="120" rx="22" fill="#fff8ec"/>
    <text x="48" y="367" class="tiny">NEEDS WORK</text>
    <text x="48" y="401" class="pattern" font-size="25">LRR</text>
    <text x="48" y="427" class="copy" font-size="13">Stale 8 days</text>
    <rect x="187" y="335" width="145" height="120" rx="22" fill="#fff8ec"/>
    <text x="207" y="367" class="tiny">MOMENTUM</text>
    <text x="207" y="401" class="pattern" font-size="25">RRL</text>
    <text x="207" y="427" class="copy" font-size="13">Getting solid</text>

    <rect x="28" y="482" width="304" height="142" rx="26" fill="#f7ead1"/>
    <text x="50" y="518" class="label" font-size="18">Next unlock</text>
    <text x="50" y="550" class="copy" font-size="14">Pair two stable cells and turn them into one longer phrase.</text>
    <text x="50" y="595" class="pattern" font-size="28">RLL  LRR</text>

    <g transform="translate(28 678)">
      <rect x="0" y="0" width="70" height="42" rx="21" fill="#f05a28"/>
      <rect x="78" y="0" width="70" height="42" rx="21" fill="#f7ead1"/>
      <rect x="156" y="0" width="70" height="42" rx="21" fill="#f7ead1"/>
      <rect x="234" y="0" width="70" height="42" rx="21" fill="#f7ead1"/>
      <text x="17" y="27" font-family="Avenir Next, Helvetica, Arial" font-size="12" font-weight="900" fill="#fff">Coach</text>
      <text x="93" y="27" class="tiny">Matrix</text>
      <text x="176" y="27" class="tiny">Focus</text>
      <text x="252" y="27" class="tiny">Progress</text>
    </g>
  </g>

  <!-- Direction 2 -->
  <g transform="translate(540 145)">
    <text x="0" y="-28" class="label" font-size="22">2. Studio Console</text>
    <text x="0" y="-6" class="copy" font-size="14">Darker, tactile, instrument-like. Best for Practice + Flow.</text>
    <rect x="0" y="0" width="360" height="760" rx="42" fill="#0d0c0b" filter="url(#shadow)"/>
    <rect x="10" y="10" width="340" height="740" rx="34" fill="#151617"/>
    <text x="32" y="58" font-family="Avenir Next, Helvetica, Arial" font-size="26" font-weight="900" fill="#f4efe6">Practice</text>
    <text x="32" y="86" font-family="Avenir Next, Helvetica, Arial" font-size="14" font-weight="600" fill="#9d968c">Flow phrase</text>

    <rect x="28" y="124" width="304" height="178" rx="28" fill="#222424" stroke="#3a3c3d"/>
    <text x="64" y="180" font-family="Avenir Next, Helvetica, Arial" font-size="36" font-weight="900" fill="#f4efe6">RLL  LRR</text>
    <text x="66" y="224" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="800" fill="#f05a28">S    T1    FT    HH    K    S</text>
    <text x="64" y="266" font-family="Avenir Next, Helvetica, Arial" font-size="13" font-weight="700" fill="#9d968c">Voice the phrase clearly. Keep the time even.</text>

    <circle cx="180" cy="425" r="88" fill="#f05a28"/>
    <circle cx="180" cy="425" r="74" fill="#151617"/>
    <circle cx="180" cy="425" r="54" fill="#f05a28"/>
    <text x="143" y="436" font-family="Avenir Next, Helvetica, Arial" font-size="28" font-weight="900" fill="#fff">PLAY</text>

    <rect x="48" y="548" width="264" height="62" rx="31" fill="#222424" stroke="#3a3c3d"/>
    <text x="72" y="586" font-family="Avenir Next, Helvetica, Arial" font-size="18" font-weight="900" fill="#f4efe6">92 BPM</text>
    <rect x="218" y="561" width="72" height="36" rx="18" fill="#f4efe6"/>
    <text x="238" y="584" font-family="Avenir Next, Helvetica, Arial" font-size="13" font-weight="900" fill="#151617">CLICK</text>

    <rect x="28" y="640" width="304" height="74" rx="26" fill="#222424" stroke="#3a3c3d"/>
    <circle cx="62" cy="677" r="13" fill="#f05a28"/>
    <text x="88" y="681" font-family="Avenir Next, Helvetica, Arial" font-size="15" font-weight="800" fill="#f4efe6">Beat pulse</text>
    <text x="248" y="681" font-family="SF Mono, Menlo, monospace" font-size="15" font-weight="800" fill="#f4efe6">03:21</text>
  </g>

  <!-- Direction 3 -->
  <g transform="translate(1010 145)">
    <text x="0" y="-28" class="label" font-size="22">3. Practice Notebook</text>
    <text x="0" y="-6" class="copy" font-size="14">Clean, structured, map-like. Best for Matrix + Progress.</text>
    <rect x="0" y="0" width="360" height="760" rx="42" fill="#191713" filter="url(#shadow)"/>
    <rect x="10" y="10" width="340" height="740" rx="34" fill="#f7f3ea"/>
    <text x="32" y="58" class="label" font-size="26">Matrix</text>
    <text x="32" y="86" class="copy" font-size="14">Build phrases from the map.</text>

    <g transform="translate(28 116)">
      <rect x="0" y="0" width="72" height="34" rx="17" fill="#15130f"/>
      <text x="16" y="23" font-family="Avenir Next, Helvetica, Arial" font-size="12" font-weight="900" fill="#fff">Control</text>
      <rect x="80" y="0" width="78" height="34" rx="17" fill="#eee4d2"/>
      <text x="96" y="23" class="tiny">Balance</text>
      <rect x="166" y="0" width="86" height="34" rx="17" fill="#eee4d2"/>
      <text x="181" y="23" class="tiny">Dynamics</text>
      <rect x="260" y="0" width="78" height="34" rx="17" fill="#eee4d2"/>
      <text x="278" y="23" class="tiny">Flow</text>
    </g>

    <rect x="28" y="170" width="304" height="78" rx="22" fill="#fffaf0" stroke="#dfd2be"/>
    <text x="50" y="202" class="label" font-size="18">Control</text>
    <text x="50" y="228" class="copy" font-size="13">Hands-only cells stay in view. Build even sound first.</text>

    <g transform="translate(28 284)">
      <text x="78" y="0" class="tiny">R</text>
      <text x="176" y="0" class="tiny">L</text>
      <text x="276" y="0" class="tiny">K</text>
      <text x="5" y="60" class="tiny">RR</text>
      <text x="5" y="140" class="tiny">LL</text>
      <text x="5" y="220" class="tiny">RL</text>

      <rect x="48" y="24" width="72" height="56" rx="17" fill="#d9e7ff" stroke="#111" stroke-width="3"/>
      <text x="66" y="60" class="pattern" font-size="20">RRR</text>
      <circle cx="111" cy="35" r="10" fill="#15130f"/>
      <text x="108" y="39" font-family="Avenir Next, Helvetica, Arial" font-size="11" font-weight="900" fill="#fff">x</text>

      <rect x="146" y="24" width="72" height="56" rx="17" fill="#fffaf0" stroke="#d6c8b5"/>
      <text x="164" y="60" class="pattern" font-size="20">LRR</text>
      <rect x="244" y="24" width="72" height="56" rx="17" fill="#e4e0d8" stroke="#d6c8b5" opacity="0.55"/>
      <text x="262" y="60" class="pattern" font-size="20" opacity="0.45">KRR</text>

      <rect x="48" y="104" width="72" height="56" rx="17" fill="#fffaf0" stroke="#d6c8b5"/>
      <text x="66" y="140" class="pattern" font-size="20">RLL</text>
      <rect x="146" y="104" width="72" height="56" rx="17" fill="#fee5df" stroke="#111" stroke-width="3"/>
      <text x="164" y="140" class="pattern" font-size="20">LLL</text>
      <rect x="244" y="104" width="72" height="56" rx="17" fill="#e4e0d8" stroke="#d6c8b5" opacity="0.55"/>
      <text x="262" y="140" class="pattern" font-size="20" opacity="0.45">KLL</text>

      <rect x="48" y="184" width="72" height="56" rx="17" fill="#fffaf0" stroke="#d6c8b5"/>
      <text x="66" y="220" class="pattern" font-size="20">RRL</text>
      <rect x="146" y="184" width="72" height="56" rx="17" fill="#fffaf0" stroke="#d6c8b5"/>
      <text x="164" y="220" class="pattern" font-size="20">LRL</text>
      <rect x="244" y="184" width="72" height="56" rx="17" fill="#e4e0d8" stroke="#d6c8b5" opacity="0.55"/>
      <text x="262" y="220" class="pattern" font-size="20" opacity="0.45">KRL</text>
    </g>

    <rect x="28" y="595" width="304" height="58" rx="29" fill="#15130f"/>
    <text x="52" y="632" font-family="Avenir Next, Helvetica, Arial" font-size="18" font-weight="900" fill="#fff">RRR - LLL</text>
    <rect x="220" y="607" width="88" height="34" rx="17" fill="#f05a28"/>
    <text x="239" y="629" font-family="Avenir Next, Helvetica, Arial" font-size="12" font-weight="900" fill="#fff">Practice</text>
  </g>
</svg>
